databases:
  - name: mechanical-insight-db
    plan: free
    databaseName: mechanical_insight
    user: admin

services:
  - type: web
    name: mechanical-insight
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: run.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mechanical-insight-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.7
