{% extends "base.html" %}

{% block title %}{{ post.title }} - Blog - Mechanical Insight{% endblock %}

{% block content %}
<section class="pt-32 pb-16 bg-gradient-to-br from-deep-navy to-electric-blue text-white">
    <div class="container mx-auto px-4">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-heading font-bold mb-4">
                {{ post.title }}
            </h1>
            {% if post.subtitle %}
                <p class="text-xl opacity-90">{{ post.subtitle }}</p>
            {% endif %}
        </div>
    </div>
</section>

<section class="py-20">
    <div class="container mx-auto px-4">
        <div class="max-w-4xl mx-auto prose prose-lg">
            {{ post.content|safe }}
        </div>
    </div>
</section>
{% endblock %}
