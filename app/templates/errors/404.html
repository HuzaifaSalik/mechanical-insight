{% extends "base.html" %}

{% block title %}Page Not Found - Mechanical Insight{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-deep-navy to-electric-blue text-white">
    <div class="container mx-auto px-4 text-center">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-9xl font-heading font-bold mb-4">404</h1>
            <h2 class="text-4xl font-heading font-semibold mb-6">Page Not Found</h2>
            <p class="text-xl mb-8 opacity-90">
                Sorry, the page you're looking for doesn't exist or has been moved.
            </p>
            <a href="{{ url_for('main.index') }}" class="inline-flex items-center px-8 py-4 bg-white text-electric-blue font-heading font-semibold rounded-lg hover:bg-neon-green hover:text-deep-navy transform hover:scale-105 transition-all duration-300">
                <i class="fas fa-home mr-2"></i>
                Back to Homepage
            </a>
        </div>
    </div>
</section>
{% endblock %}
